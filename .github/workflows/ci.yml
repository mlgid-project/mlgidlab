# Stabilisation sprint, workstream D: run the pytest-qt smoke harness
# headless on every push / PR so the regression net defends itself.
#
# The harness is headless (QT_QPA_PLATFORM=offscreen) and hermetic
# (tests/conftest.py redirects XDG_CONFIG_HOME), so no display / xvfb
# is needed. conftest.py already sets the offscreen platform via
# os.environ.setdefault; it is also set here so the intent is visible
# at the CI level and an explicit override would still win.
#
# Only the base + dev dependencies are installed. The heavy `pipeline`
# extra (torch + mlgidbase) is deliberately omitted: the smoke suite
# verified that open / frame / save / close never import it.

name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: smoke harness (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the requires-python floor; 3.12 is the dev/runtime
        # environment the suite was validated against; 3.13 and 3.14
        # are forward-compat. fail-fast is false, so if a newer Python
        # fails only because an upstream dep (PySide6 / pyFAI / silx /
        # scipy / h5py) has no wheel for it yet, the older jobs still
        # report.
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PySide6's offscreen platform plugin still links the Qt GUI
      # libraries, so a few system libs are required even with no
      # display. pip wheels bundle the rest of Qt.
      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libxcb-cursor0 libdbus-1-3 libfontconfig1

      - name: Install package (base + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke harness
        env:
          QT_QPA_PLATFORM: offscreen
        # ``-v`` so each test name flushes to stdout *before* it runs;
        # without it a mid-test segfault dumps a C stack but the
        # Python-side test name never reaches the log, so we can't
        # tell which test crashed. ``-rA`` also prints the per-test
        # summary at the end (passed / skipped / failed names) for
        # quick triage when one Python version diverges from another.
        run: pytest -v -rA
